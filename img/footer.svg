<svg viewBox="0 0 115 25"
xmlns="http://www.w3.org/2000/svg"
xmlns:xlink="http://www.w3.org/1999/xlink">


<style>

svg {
  width:100vw;
  position:fixed;
  top:-5px;
  overflow:visible;
}


/* base sombre */
.wave {
  animation: flow 16s linear infinite;
  fill:#0b1220;
}


/* profondeur */
.wave-mid {
  animation: flow 22s linear infinite reverse;
  fill:#172554;
  opacity:.75;
}


/* lumière */
.wave-light {
  animation: flow 28s linear infinite;
  fill:#0891b2;
  opacity:.35;
}


/* déplacement */
@keyframes flow {

from {
 transform:translateX(0);
}

to {
 transform:translateX(-50%);
}

}


/* halo léger */
.glow {
filter:url(#softGlow);
}


</style>



<defs>


<filter id="softGlow">

<feGaussianBlur
stdDeviation="0.6"
result="blur"/>

<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>



<!-- vague originale -->

<path id="cyberWave"

d="
M0 13
C12 8 25 8 38 13
C52 18 65 18 78 13
C92 8 105 8 120 13
C135 18 150 18 165 13
C180 8 195 8 220 13
V30
H0
Z"
/>


</defs>



<!-- lumière arrière -->

<use
class="wave-light glow"
xlink:href="#cyberWave"
x="0"
y="-3"/>



<!-- profondeur -->

<use
class="wave-mid"
xlink:href="#cyberWave"
x="0"
y="0"/>



<!-- fond -->

<use
class="wave"
xlink:href="#cyberWave"
x="0"
y="3"/>



</svg>
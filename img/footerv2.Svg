<svg viewBox="0 0 115 25"
xmlns="http://www.w3.org/2000/svg"
xmlns:xlink="http://www.w3.org/1999/xlink">

<style>

svg {
  width:100vw;
  position:fixed;
  top:-5px;
  overflow:visible;
}


/* fond Syltux */
.wave {
  animation: flow 16s linear infinite;
  fill:#050405;
}


/* mauve profond */
.wave-mid {
  animation: flow 22s linear infinite reverse;
  fill:#6D327F;
  opacity:.75;
}


/* mauve clair lumineux */
.wave-light {
  animation: flow 28s linear infinite;
  fill:#CE78F8;
  opacity:.35;
}


/* accent jaune */
.wave-accent {
  animation: flow 34s linear infinite reverse;
  fill:#F8C709;
  opacity:.18;
}


@keyframes flow {

from {
 transform:translateX(0);
}

to {
 transform:translateX(-50%);
}

}


.glow {
 filter:url(#softGlow);
}


</style>


<defs>


<filter id="softGlow">

<feGaussianBlur
stdDeviation="0.7"
result="blur"/>

<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>



<path id="cyberWave"

d="
M0 13
C12 8 25 8 38 13
C52 18 65 18 78 13
C92 8 105 8 120 13
C135 18 150 18 165 13
C180 8 195 8 220 13
V30
H0
Z"/>


</defs>



<!-- reflet jaune signature -->

<use
class="wave-accent glow"
xlink:href="#cyberWave"
x="0"
y="-4"/>



<!-- lumière mauve -->

<use
class="wave-light glow"
xlink:href="#cyberWave"
x="0"
y="-2"/>



<!-- profondeur -->

<use
class="wave-mid"
xlink:href="#cyberWave"
x="0"
y="0"/>



<!-- base noire -->

<use
class="wave"
xlink:href="#cyberWave"
x="0"
y="3"/>



</svg>